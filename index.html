
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado Fax - Calidad y Confianza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D32F2F', // Rojo característico de Fax
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="https://via.placeholder.com/50" alt="Logo Fax" class="h-10">
                <div>
                    <h1 class="font-bold text-xl">SUPERMERCADO FAX</h1>
                    <p class="text-xs text-gray-500">CALIDAD Y CONFIANZA</p>
                </div>
            </div>
            <div class="flex-grow mx-6">
                <input type="text" placeholder="¿Qué estás buscando?" class="w-full border border-gray-300 rounded-full px-5 py-2 focus:outline-primary">
            </div>
            <div class="flex items-center gap-4">
                <a href="#" class="flex items-center gap-1 text-sm font-medium">Ingresar</a>
                <div class="relative">
                    <span class="text-xl">🛒</span>
                    <span class="absolute -top-2 -right-2 bg-primary text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">3</span>
                </div>
                <span class="font-bold">$ 8.450</span>
            </div>
        </div>
        <!-- Navbar -->
        <nav class="bg-primary text-white">
            <div class="container mx-auto px-4 flex gap-6 text-sm font-medium py-2">
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Todas las categorías</a>
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Ofertas</a>
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Almacén</a>
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Bebidas</a>
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Lácteos</a>
                <a href="#" class="hover:bg-red-700 px-3 py-1 rounded">Limpieza</a>
            </div>
        </nav>
    </header>

    <!-- Banner -->
    <section class="container mx-auto px-4 py-8 flex items-center">
        <div class="w-1/2">
            <h2 class="text-5xl font-extrabold text-gray-900 leading-tight">HACÉ TU PEDIDO<br><span class="text-primary">SIN SALIR DE CASA</span></h2>
            <p class="mt-4 text-gray-600">Envíos a domicilio o retiro en el local</p>
            <div class="flex gap-4 mt-6">
                <button class="bg-primary text-white px-6 py-3 rounded-lg font-bold">Envío a domicilio</button>
                <button class="border border-gray-300 px-6 py-3 rounded-lg font-bold bg-white">Retiro en el local</button>
            </div>
        </div>
        <div class="w-1/2 flex justify-center">
            <div class="bg-gray-200 w-80 h-80 rounded-full flex items-center justify-center">
                <span class="text-gray-500">Imagen Bolsa Fax</span>
            </div>
        </div>
    </section>

    <!-- Categorías -->
    <section class="container mx-auto px-4 py-8">
        <h3 class="text-xl font-bold mb-6">CATEGORÍAS</h3>
        <div class="grid grid-cols-4 md:grid-cols-8 gap-4">
            <!-- Ejemplo de categoría -->
            <div class="bg-white p-3 rounded-xl border border-gray-200 text-center shadow-sm">
                <div class="h-16 bg-gray-100 rounded-lg mb-2"></div>
                <p class="text-xs font-semibold">Almacén</p>
            </div>
            <!-- Repetir según necesidad -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-10 mt-10">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Supermercado Fax. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
