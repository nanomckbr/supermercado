<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supermercado Fax</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
body { background:#f5f5f5; }

/* HEADER */
header {
  background:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img { height:40px; }

.search {
  flex:1;
  margin:0 20px;
  display:flex;
}

.search input {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:20px 0 0 20px;
}

.search button {
  background:#e30613;
  border:none;
  color:white;
  padding:10px 20px;
  border-radius:0 20px 20px 0;
}

/* NAV */
nav {
  background:#e30613;
  color:white;
  padding:10px 30px;
  display:flex;
  gap:20px;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  padding:40px;
  background:#eee;
}

.hero h1 span { color:#e30613; }

.btn {
  padding:12px;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

.btn-primary { background:#e30613; color:white; }

/* PRODUCTS */
.products {
  padding:30px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
}

.card button {
  background:#e30613;
  color:white;
  border:none;
  padding:8px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
}

/* CART */
.cart {
  position:fixed;
  right:20px;
  bottom:20px;
  background:white;
  padding:20px;
  border-radius:10px;
  width:250px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.cart h3 { margin-bottom:10px; }

.whatsapp {
  background:#25D366;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="search">
    <input placeholder="¿Qué estás buscando?">
    <button>🔍</button>
  </div>

  <div>🛒</div>
</header>

<nav>
  <div>Ofertas</div>
  <div>Almacén</div>
  <div>Bebidas</div>
  <div>Lácteos</div>
</nav>

<section class="hero">
  <div>
    <h1>HACÉ TU PEDIDO <br><span>SIN SALIR DE CASA</span></h1>
    <p>Envíos o retiro en local</p>
  </div>
</section>

<section class="products">
  <h2>Productos</h2>

  <div class="grid">

    <div class="card">
      <h4>Aceite Natura</h4>
      <p>$1850</p>
      <button onclick="addToCart('Aceite Natura',1850)">Agregar</button>
    </div>

    <div class="card">
      <h4>Yerba Amanda</h4>
      <p>$2650</p>
      <button onclick="addToCart('Yerba Amanda',2650)">Agregar</button>
    </div>

    <div class="card">
      <h4>Leche</h4>
      <p>$1200</p>
      <button onclick="addToCart('Leche',1200)">Agregar</button>
    </div>

  </div>
</section>

<div class="cart">
  <h3>🛒 Pedido</h3>
  <ul id="cart-list"></ul>
  <p><strong>Total: $<span id="total">0</span></strong></p>

  <button class="whatsapp" onclick="sendWhatsApp()">
    Enviar por WhatsApp
  </button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;
  renderCart();
}

function renderCart() {
  const list = document.getElementById("cart-list");
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.name + " - $" + item.price;
    list.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

function sendWhatsApp() {
  let message = "Hola, quiero hacer este pedido:%0A";

  cart.forEach(item => {
    message += "- " + item.name + " ($" + item.price + ")%0A";
  });

  message += "%0ATotal: $" + total;

  window.open("https://wa.me/549XXXXXXXXXX?text=" + message, "_blank");
}
</script>

</body>
</html>
