<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Supermercado Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D32F2F', // El rojo vibrante que definimos
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-primary">NombreSúper</h1>
            <input type="text" placeholder="¿Qué estás buscando?" class="border rounded-lg px-4 py-2 w-1/2 focus:outline-primary">
            <button class="bg-primary text-white px-6 py-2 rounded-lg font-semibold">Mi Carrito</button>
        </div>
    </header>

    <section class="container mx-auto px-4 py-10 text-center">
        <div class="bg-primary text-white rounded-2xl p-10">
            <h2 class="text-4xl font-bold mb-4">HACÉ TU PEDIDO SIN SALIR DE CASA</h2>
            <div class="flex justify-center gap-4 mt-6">
                <button class="bg-white text-primary px-8 py-3 rounded-lg font-bold">Retiro en Local</button>
                <button class="bg-white text-primary px-8 py-3 rounded-lg font-bold">Envío a Domicilio</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <h3 class="text-2xl font-bold mb-6">Productos Destacados</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <div class="h-40 bg-gray-200 rounded-lg mb-4"></div>
                <h4 class="font-bold">Producto Ejemplo</h4>
                <p class="text-primary font-bold">$ 1.500</p>
                <button class="w-full mt-2 bg-primary text-white py-2 rounded-lg">Agregar</button>
            </div>
            </div>
    </main>

</body>
</html>
